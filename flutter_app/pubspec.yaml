name: cashier_app
description: Integrated cashier program for Windows, Android, and iOS with Arabic support.

publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  
  # UI & Navigation
  cupertino_icons: ^1.0.2
  go_router: ^13.0.0
  provider: ^6.0.0
  
  # Localization
  intl: ^0.19.0
  flutter_localizations:
    sdk: flutter
  
  # API & HTTP
  http: ^1.1.0
  dio: ^5.3.0
  web_socket_channel: ^2.4.0
  
  # State Management
  riverpod: ^2.4.0
  riverpod_annotation: ^2.1.0
  
  # Database
  sqflite: ^2.3.0
  path_provider: ^2.1.0
  
  # Authentication
  flutter_secure_storage: ^9.0.0
  
  # UI Components
  flutter_staggered_grid_view: ^0.7.0
  shimmer: ^3.0.0
  
  # Date & Time
  intl: ^0.19.0
  
  # PDF & Reports
  pdf: ^3.10.0
  printing: ^5.11.0
  
  # Camera (for receipt scanning)
  camera: ^0.10.5
  image_picker: ^1.0.0
  
  # Notifications
  flutter_local_notifications: ^14.1.0
  
  # Device Info
  device_info_plus: ^9.1.0
  platform_device_id: ^1.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  build_runner: ^2.4.0
  riverpod_generator: ^2.3.0

flutter:
  uses-material-design: true
  
  assets:
    - assets/images/
    - assets/icons/
    - assets/animations/
  
  fonts:
    - family: Cairo
      fonts:
        - asset: assets/fonts/Cairo-Regular.ttf
        - asset: assets/fonts/Cairo-Bold.ttf
          weight: 700
    - family: Roboto
      fonts:
        - asset: assets/fonts/Roboto-Regular.ttf
        - asset: assets/fonts/Roboto-Bold.ttf
          weight: 700
